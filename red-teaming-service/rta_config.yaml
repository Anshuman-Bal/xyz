attack_library:
  directory: "attack_library"

campaign_settings:
  mutation:
    enabled: false
    modes:
      lexical_rephrase: true
      indirect_framing: true
      politeness_masking: false
      compliance_wrapping: false
      goal_abstraction_shift: false
      contextual_embedding: false

  chaining:
    enabled: true

attack_selection:
  categories:
    AUTONOMOUS_AGENT_OVERREACH:
      enabled: true
      subcategories: 1
      techniques: 2
      # techniques can be either:
      # 1) all
      # 2) an integer (applies to every selected sub-category)
      # 3) a per-sub-category map, for example:
      # techniques:
      #   default: 2
      #   AA-GD: 1

    DATA_LEAKAGE:
      enabled: false
      subcategories: all
      techniques: all

    GOVERNANCE_AND_COMPLIANCE_GAP:
      enabled: false
